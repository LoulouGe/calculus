<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Maths Rigolotes 🌈</title>
    <link rel="stylesheet" href="style.css">
    <!-- PWA manifest and icons -->
    <link rel="manifest" href="manifest.json?v=1">
    <link rel="icon" href="assets/IMG_3723.png?v=1">
    <!-- Apple touch icon for iOS/macOS when added to home screen or dock -->
    <link rel="apple-touch-icon" href="assets/IMG_3723.png?v=1">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#ff69b4">
</head>
<body>

    <!-- Unicorns and stars floating in the background -->
    <div class="unicorns">
        <span class="unicorn">🦄</span>
        <span class="unicorn">🦄</span>
        <span class="unicorn">🦄</span>
        <span class="unicorn">🦄</span>
        <span class="unicorn">🦄</span>
        <span class="unicorn">🦄</span>
        <span class="unicorn">🦄</span>
        <span class="unicorn">🦄</span>
        <span class="unicorn">🦄</span>
        <span class="unicorn">🦄</span>
        <span class="unicorn">🦄</span>
        <span class="unicorn">🦄</span>
        <span class="unicorn">🦄</span>
        <span class="unicorn">🦄</span>
        <span class="unicorn">🦄</span>
        <span class="unicorn">🦄</span>
        <span class="unicorn">🦄</span>
        <span class="unicorn">🦄</span>
        <span class="unicorn star">⭐</span>
        <span class="unicorn star">⭐</span>
        <span class="unicorn star">⭐</span>
        <span class="unicorn star">⭐</span>
        <span class="unicorn star">⭐</span>
        <span class="unicorn star">⭐</span>
        <span class="unicorn star">⭐</span>
        <span class="unicorn star">⭐</span>
    </div>

    <!-- Sparkles / glitter -->
    <div class="sparkles">
        <span class="sparkle"></span>
        <span class="sparkle"></span>
        <span class="sparkle"></span>
        <span class="sparkle"></span>
        <span class="sparkle"></span>
        <span class="sparkle"></span>
        <span class="sparkle"></span>
        <span class="sparkle"></span>
        <span class="sparkle"></span>
        <span class="sparkle"></span>
        <span class="sparkle"></span>
        <span class="sparkle"></span>
        <span class="sparkle"></span>
        <span class="sparkle"></span>
        <span class="sparkle"></span>
    </div>

    <!-- Operation selection screen -->
    <div class="game-container" id="menu-screen">
        <h1>Maths Rigolotes 🌈</h1>
        <p class="menu-subtitle">Choisis ton opération !</p>
        <div class="menu-options">
            <button class="menu-btn selected" onclick="selectOperation(this, 'add')">➕ Addition</button>
            <button class="menu-btn" onclick="selectOperation(this, 'sub')">➖ Soustraction</button>
            <button class="menu-btn" onclick="selectOperation(this, 'mul')">✖️ Multiplication</button>
            <button class="menu-btn" onclick="selectOperation(this, 'div')">➗ Division</button>
        </div>
        <p class="menu-subtitle">Choisis ton niveau !</p>
        <div class="level-options">
            <button class="level-btn selected" onclick="selectLevel(this, 1)">⭐</button>
            <button class="level-btn" onclick="selectLevel(this, 2)">⭐⭐</button>
            <button class="level-btn" onclick="selectLevel(this, 3)">⭐⭐⭐</button>
        </div>
        <button id="start-btn" onclick="startGame()">▶</button>
        <p id="total-stars"></p>
    </div>

    <!-- Result screen -->
    <div class="game-container hidden" id="result-screen">
        <h1>Bravo !</h1>
        <p class="result-text">⭐ <span id="result-score"></span></p>
        <button class="home-btn" onclick="backToMenu()">🏠 Retour a la maison</button>
    </div>

    <!-- Game screen -->
    <div class="game-container hidden" id="game-screen">
        <div class="header">
            <span id="score">⭐ 0</span>
            <span id="question-count"></span>
            <button id="back-btn" onclick="backToMenu()">🏠</button>
        </div>

        <div class="question-box">
            <span id="num1">?</span>
            <span id="operator">+</span>
            <span id="num2">?</span>
            <span>=</span>
            <span id="answer">?</span>
        </div>

        <p id="hint"></p>

        <div class="options" id="options"></div>

        <button id="next-btn" class="hidden" onclick="generateGame()">&rarr;Suivant</button>
    </div>
    <script src="script.js"></script>

    <!-- register service worker for PWA -->
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('service-worker.js')
          .then(() => console.log('Service worker registered'))
          .catch(err => console.error('SW registration failed:', err));
      }
    </script>
</body>
</html>
